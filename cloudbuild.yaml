# ══════════════════════════════════════════════════════════
# Google Cloud Build — ServiceDesk
#
# Builds and pushes three container images:
#   1. servicedesk-api       (Express backend)
#   2. servicedesk-frontend  (Next.js)
#   3. servicedesk-nginx     (Reverse proxy)
#
# Required substitutions (set in trigger or CLI):
#   _REGION          — Artifact Registry region  (default: me-central1)
#   _REPO            — Artifact Registry repo    (default: servicedesk)
#   _DOMAIN          — Public-facing origin      (default: https://servicedesk.example.com)
#   _TAG             — Image tag                  (default: latest)
#
# Usage:
#   gcloud builds submit . \
#     --config=cloudbuild.yaml \
#     --substitutions=_DOMAIN=https://your-domain.com
# ══════════════════════════════════════════════════════════

substitutions:
  _REGION: me-central1
  _REPO: servicedesk
  _DOMAIN: https://servicedesk.example.com
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamic_substitutions: true

steps:
  # ── 1. Build API image ───────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-api:${_TAG}
      - -f
      - ServiceDesk-backend/Dockerfile
      - ServiceDesk-backend

  # ── 2. Build Frontend image ──────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-frontend:${_TAG}
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_DOMAIN}/api/v2
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_SOCKET_URL=${_DOMAIN}
      - -f
      - ServiceDesk-app/Dockerfile
      - ServiceDesk-app

  # ── 3. Build Nginx image ─────────────────────────────────
  - id: build-nginx
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-nginx:${_TAG}
      - -f
      - nginx/Dockerfile
      - nginx

# ── Push all images ──────────────────────────────────────
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-api:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-frontend:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/servicedesk-nginx:${_TAG}

timeout: 1800s
